name: CI/CD

on:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@main

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@master

      - name: GitHub Container registry 로그인
        uses: docker/login-action@master
        with:
          registry: ghcr.io
          username: ${{secrets.GHCR_USERNAME}}
          password: ${{secrets.GHCR_TOKEN}}

      - name: 빌드 및 푸시
        uses: docker/build-push-action@master
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{github.repository_owner}}/eurocell-mes-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@main

      - name: .env 생성
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          echo "$SECRETS_JSON" | jq -r 'to_entries | map(select(.key | test("^(SSH_|GHCR_|SERVER_)") | not)) | map("\(.key)=\(.value|tostring)") | .[]' > .env.backend

      - name: .env 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: .env.backend
          target: /home/${{ secrets.SSH_USERNAME }}
          overwrite: true
          timeout: 120s

      - name: 서버 접속
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euo pipefail

            cd ~

            # GHCR 로그인 & 이미지 pull
            echo ${{secrets.GHCR_TOKEN}} | docker login ghcr.io -u ${{secrets.GHCR_USERNAME}} --password-stdin
            docker pull ghcr.io/${{github.repository_owner}}/eurocell-mes-be:latest

            NET_NAME="eurocell"
            SVC="eurocell-mes-be"
            ACTIVE_ALIAS="${SVC}-active"
            NGINX_CONTAINER="nginx"

            # 현재 떠있는 쪽 판단
            if docker ps --format '{{.Names}}' | grep -q "^${SVC}-blue$"; then
              NEW="${SVC}-green"
              OLD="${SVC}-blue"
            else
              NEW="${SVC}-blue"
              OLD="${SVC}-green"
            fi

            # 새 컨테이너 기동
            docker compose -f docker-compose.be.yml up -d "$NEW"

            # 헬스체크 대기 (최대 30초)
            for i in {1..30}; do
              if docker exec "$NEW" nc -z localhost 8080 2>/dev/null; then
                echo "Container is healthy"
                break
              fi
              sleep 1
            done

            # 트래픽 전환
            docker network disconnect "$NET_NAME" "$OLD" 2>/dev/null || true
            docker network connect "$NET_NAME" "$OLD" 2>/dev/null || true

            docker network disconnect "$NET_NAME" "$NEW" 2>/dev/null || true
            docker network connect --alias "$ACTIVE_ALIAS" "$NET_NAME" "$NEW"

            # Nginx 리로드
            docker exec "$NGINX_CONTAINER" nginx -s reload

            # 이전 버전 정리 (30초 후)
            sleep 30
            docker compose -f docker-compose.be.yml stop "$OLD" || true
            docker compose -f docker-compose.be.yml rm -f "$OLD" || true

            # 이미지 정리
            docker image prune -f
